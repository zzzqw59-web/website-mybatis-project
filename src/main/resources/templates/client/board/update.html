<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <section layout:fragment="content" class="py-5 mt-5">
        <div class="mb-4">
            <h3>게시글 수정</h3>
        </div>

        <form id="updateForm" th:action="@{/board/update}" th:object="${board}" method="post">
            <input type="hidden" name="boardNumber" th:value="*{boardNumber}">
            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">작성자</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" th:field="*{boardName}" readonly>
                </div>
            </div>
            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">글제목</label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" th:field="*{boardTitle}">
                </div>
            </div>
            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">글내용</label>
                <div class="col-sm-10">
                    <textarea class="form-control board-textarea" rows="8" th:field="*{boardContent}"></textarea>
                </div>
            </div>
            <div class="mb-3 row">
                <label class="col-sm-2 col-form-label">비밀번호</label>
                <div class="col-sm-10">
                    <input type="password" class="form-control" id="boardPasswd" name="boardPasswd" placeholder="변경할 비밀번호를 입력해주세요.">
                </div>
            </div>
            <div class="text-end">
                <button type="submit" id="boardUpdateBtn" class="btn btn-primary">글 수정</button>
                <button type="reset" id="boardCancelBtn" class="btn btn-primary">수정 취소</button>
                <a th:href="@{/board/list}" id="boardListBtn" class="btn btn-outline-secondary">글 목록</a>
            </div>
        </form>
    </section>

    <th:block layout:fragment="script">
        <script th:src="@{/js/common/common.js}"></script>
        <script th:scr="@{/js/board/update.js}" defer></script>
    </th:block>
</body>
</html>
