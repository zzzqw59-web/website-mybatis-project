<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/client/layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <section layout:fragment="content" class="py-5 mt-5">
        <div class="mb-4">
            <h3>게시판 입력</h3>
        </div>

        <form th:action="@{/board/write}" id="insertForm" th:object="${board}" method="post">
            <div class="mb-3 row">
                <label for="boardName" class="col-sm-2 col-form-label">작성자</label>
                <div class="col-sm-10">
                    <input type="text" id="boardName" class="form-control" th:field="*{boardName}" placeholder="작성자를 입력하세요.">
                </div>
            </div>
            <div class="mb-3 row">
                <label for="boardTitle" class="col-sm-2 col-form-label">글 제목</label>
                <div class="col-sm-10">
                    <input type="text" id="boardTitle" class="form-control" th:field="*{boardTitle}" placeholder="글 제목을 입력하세요.">
                </div>
            </div>
            <div class="mb-3 row">
                <label for="boardContent" class="col-sm-2 col-form-label">글 내용</label>
                <div class="col-sm-10">
                    <textarea id="boardContent" class="form-control board-textarea" rows="8" th:field="*{boardContent}" placeholder="글 내용을 입력하세요."></textarea>
                </div>
            </div>
            <div class="mb-3 row">
                <label for="boardPasswd" class="col-sm-2 col-form-label">비밀번호</label>
                <div class="col-sm-10">
                    <input type="text" id="boardPasswd" class="form-control" th:field="*{boardPasswd}" placeholder="비밀번호를 입력하세요.">
                </div>
            </div>
            <div class="text-end">
                <button type="submit" id="boardInsertBtn" class="btn btn-primary">글 저장</button>
                <button type="reset" id="boardCancelBtn" class="btn btn-primary">입력 취소</button>
                <a th:href="@{/board/list}" id="boardListBtn" class="btn btn-outline-secondary">글 목록</a>
            </div>
        </form>
    </section>

    <th:block layout:fragment="script">
        <script th:src="@{/js/board/write.js}" defer></script>
    </th:block>
</body>
</html>
