<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <section layout:fragment="content" class="py-5 mt-5">
        <div class="mb-4">
            <h3>게시판 상세</h3>
        </div>

        <div th:object="${board}">
            <form name="dataForm" id="dataForm" method="post">
                <input type="hidden" id="boardNumber" name="boardNumber" th:value="*{boardNumber}">
            </form>

            <table class="table table-bordered">
                <tbody>
                    <tr>
                        <td class="col-md-3 text-center">작성자</td>
                        <td class="col-md-3 text-start">
                            <span th:text="*{boardName}"></span>
                            <span>(조회수: <span th:text="*{boardReadCnt}"></span></span>
                        </td>
                        <td class="col-md-3 text-center">작성일</td>
                        <td class="col-md-3 text-start" th:text="*{boardDate}"></td>
                    </tr>
                    <tr>
                        <td class="col-md-3 text-center">글제목</td>
                        <td colspan="3" class="col-md-9 text-start" th:text="*{boardTitle}"></td>
                    </tr>
                    <tr class="board-table-tr-height">
                        <td class="col-md-3 text-center align-middle">글내용</td>
                        <td colspan="3" class="col-md-9 text-start board-content" th:text="*{boardContent}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-item-center mt-4">
            <div id="pwdFormArea">

            </div>
            <div>
                <buttton type="button" id="updateFormBtn" class="btn btn-warning">글 수정</buttton>
                <buttton type="button" id="BoardDeleteBtn" class="btn btn-danger">글 삭제</buttton>
                <a th:href="@{/board/write}" id="writeFormBtn" class="btn btn-primary">글 쓰기</a>
                <a th:href="@{/board/list}" id="BoardListBtn" class="btn btn-outline-secondary">글 목록</a>
            </div>
        </div>
    </section>

    <th:block layout:fragment="script"> // ?
        <script th:src="@{/js/board/detail.js}" defer></script>
    </th:block>
</body>
</html>
